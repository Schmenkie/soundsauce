<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090B"/>
      <stop offset="100%" stop-color="#18181B"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="bar-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#27272A" stroke-width="0.5" opacity="0.4">
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>

  <!-- Waveform bars (left background decoration) -->
  <g opacity="0.12">
    <rect x="60" y="200" width="14" height="230" rx="7" fill="url(#bar-grad)"/>
    <rect x="88" y="140" width="14" height="350" rx="7" fill="url(#bar-grad)"/>
    <rect x="116" y="180" width="14" height="270" rx="7" fill="url(#bar-grad)"/>
    <rect x="144" y="220" width="14" height="190" rx="7" fill="url(#bar-grad)"/>
    <rect x="172" y="160" width="14" height="310" rx="7" fill="url(#bar-grad)"/>
    <rect x="200" y="240" width="14" height="150" rx="7" fill="url(#bar-grad)"/>
  </g>

  <!-- Waveform bars (right background decoration) -->
  <g opacity="0.12">
    <rect x="974" y="200" width="14" height="230" rx="7" fill="url(#bar-grad)"/>
    <rect x="1002" y="150" width="14" height="330" rx="7" fill="url(#bar-grad)"/>
    <rect x="1030" y="190" width="14" height="250" rx="7" fill="url(#bar-grad)"/>
    <rect x="1058" y="230" width="14" height="170" rx="7" fill="url(#bar-grad)"/>
    <rect x="1086" y="170" width="14" height="290" rx="7" fill="url(#bar-grad)"/>
    <rect x="1114" y="250" width="14" height="130" rx="7" fill="url(#bar-grad)"/>
  </g>

  <!-- Logo icon -->
  <g transform="translate(520, 130)">
    <rect width="64" height="64" rx="12" fill="url(#logo-grad)"/>
    <g stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none">
      <line x1="14" y1="24" x2="14" y2="40"/>
      <line x1="22" y1="16" x2="22" y2="48"/>
      <line x1="30" y1="10" x2="30" y2="54"/>
      <line x1="38" y1="18" x2="38" y2="46"/>
      <line x1="46" y1="22" x2="46" y2="42"/>
      <line x1="54" y1="26" x2="54" y2="38"/>
    </g>
  </g>

  <!-- Title -->
  <text x="600" y="275" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#FAFAFA">
    SoundSauce
  </text>

  <!-- Gradient underline -->
  <rect x="380" y="295" width="440" height="4" rx="2" fill="url(#accent-grad)"/>

  <!-- Tagline -->
  <text x="600" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#A1A1AA">
    Hear a sound you like — learn how to make it
  </text>

  <!-- Feature pills -->
  <g transform="translate(600, 415)" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600">
    <rect x="-340" y="0" width="150" height="36" rx="18" fill="#27272A"/>
    <text x="-265" y="24" fill="#A1A1AA">Audio Analysis</text>

    <rect x="-160" y="0" width="150" height="36" rx="18" fill="#27272A"/>
    <text x="-85" y="24" fill="#A1A1AA">Sound Design</text>

    <rect x="20" y="0" width="150" height="36" rx="18" fill="#27272A"/>
    <text x="95" y="24" fill="#A1A1AA">Vital Presets</text>

    <rect x="200" y="0" width="150" height="36" rx="18" fill="#27272A"/>
    <text x="275" y="24" fill="#A1A1AA">Community</text>
  </g>

  <!-- URL -->
  <text x="600" y="540" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="url(#accent-grad)">
    soundsauce.app
  </text>
</svg>
