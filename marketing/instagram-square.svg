<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090B"/>
      <stop offset="100%" stop-color="#18181B"/>
    </linearGradient>
    <linearGradient id="ember2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="logo2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg2)"/>

  <!-- Top section: Question -->
  <text x="540" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#FAFAFA">
    Hear a sound you love?
  </text>
  <text x="540" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#ember2)">
    Learn to make it.
  </text>

  <!-- Mockup card: "before" -->
  <rect x="80" y="280" width="420" height="340" rx="16" fill="#18181B" stroke="#3F3F46" stroke-width="1"/>
  <text x="140" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#71717A">UPLOAD</text>
  <!-- Mini waveform -->
  <g transform="translate(290, 420)" opacity="0.7">
    <rect x="-140" y="-30" width="6" height="60" rx="3" fill="#71717A"/>
    <rect x="-126" y="-45" width="6" height="90" rx="3" fill="#71717A"/>
    <rect x="-112" y="-55" width="6" height="110" rx="3" fill="#71717A"/>
    <rect x="-98" y="-35" width="6" height="70" rx="3" fill="#71717A"/>
    <rect x="-84" y="-65" width="6" height="130" rx="3" fill="#71717A"/>
    <rect x="-70" y="-50" width="6" height="100" rx="3" fill="#71717A"/>
    <rect x="-56" y="-70" width="6" height="140" rx="3" fill="#71717A"/>
    <rect x="-42" y="-40" width="6" height="80" rx="3" fill="#71717A"/>
    <rect x="-28" y="-60" width="6" height="120" rx="3" fill="#71717A"/>
    <rect x="-14" y="-75" width="6" height="150" rx="3" fill="#71717A"/>
    <rect x="0" y="-55" width="6" height="110" rx="3" fill="#71717A"/>
    <rect x="14" y="-70" width="6" height="140" rx="3" fill="#71717A"/>
    <rect x="28" y="-45" width="6" height="90" rx="3" fill="#71717A"/>
    <rect x="42" y="-65" width="6" height="130" rx="3" fill="#71717A"/>
    <rect x="56" y="-35" width="6" height="70" rx="3" fill="#71717A"/>
    <rect x="70" y="-55" width="6" height="110" rx="3" fill="#71717A"/>
    <rect x="84" y="-45" width="6" height="90" rx="3" fill="#71717A"/>
    <rect x="98" y="-30" width="6" height="60" rx="3" fill="#71717A"/>
    <rect x="112" y="-40" width="6" height="80" rx="3" fill="#71717A"/>
    <rect x="126" y="-25" width="6" height="50" rx="3" fill="#71717A"/>
  </g>
  <!-- Question mark -->
  <text x="290" y="580" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#71717A">
    What made this sound?
  </text>

  <!-- Arrow -->
  <g transform="translate(540, 450)">
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
    <polyline points="12,-8 20,0 12,8" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Mockup card: "after" -->
  <rect x="580" y="280" width="420" height="340" rx="16" fill="#18181B" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.3"/>
  <text x="640" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#F59E0B">RESULT</text>

  <!-- Analysis results -->
  <text x="640" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#A1A1AA">Waveform</text>
  <text x="880" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#FAFAFA" text-anchor="end">Sawtooth</text>

  <text x="640" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#A1A1AA">Filter Cutoff</text>
  <text x="880" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#FAFAFA" text-anchor="end">2.4 kHz</text>

  <text x="640" y="445" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#A1A1AA">Attack</text>
  <text x="880" y="445" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#FAFAFA" text-anchor="end">45 ms</text>

  <text x="640" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#A1A1AA">Reverb</text>
  <text x="880" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#FAFAFA" text-anchor="end">35%</text>

  <text x="640" y="515" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#A1A1AA">Best Preset</text>
  <text x="880" y="515" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#F59E0B" text-anchor="end">Warm Pad (92%)</text>

  <!-- Download button -->
  <rect x="620" y="540" width="360" height="44" rx="8" fill="url(#ember2)"/>
  <text x="800" y="568" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#09090B">
    Download .vital Preset
  </text>

  <!-- Bottom section -->
  <text x="540" y="720" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#71717A">
    Works with any audio file. Free to use.
  </text>

  <!-- Feature pills -->
  <g transform="translate(540, 780)" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600">
    <rect x="-330" y="0" width="180" height="40" rx="20" fill="#27272A"/>
    <text x="-240" y="26" fill="#A1A1AA">Audio Analysis</text>

    <rect x="-120" y="0" width="240" height="40" rx="20" fill="#27272A"/>
    <text x="0" y="26" fill="#A1A1AA">Free Vital Presets</text>

    <rect x="150" y="0" width="180" height="40" rx="20" fill="#27272A"/>
    <text x="240" y="26" fill="#A1A1AA">Stem Separation</text>
  </g>

  <!-- Logo + URL -->
  <g transform="translate(440, 900)">
    <rect width="44" height="44" rx="9" fill="url(#logo2)"/>
    <g stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none">
      <line x1="9" y1="17" x2="9" y2="27"/>
      <line x1="14" y1="12" x2="14" y2="32"/>
      <line x1="19" y1="8" x2="19" y2="36"/>
      <line x1="24" y1="13" x2="24" y2="31"/>
      <line x1="29" y1="16" x2="29" y2="28"/>
      <line x1="34" y1="18" x2="34" y2="26"/>
    </g>
  </g>
  <text x="500" y="932" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="url(#ember2)">
    soundsauce.app
  </text>

  <!-- Tagline -->
  <text x="540" y="1000" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#71717A">
    Sound design made simple
  </text>
</svg>
