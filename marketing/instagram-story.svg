<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#09090B"/>
      <stop offset="100%" stop-color="#18181B"/>
    </linearGradient>
    <linearGradient id="ember3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="ember3-v" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="logo3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bg3)"/>

  <!-- Ambient glow -->
  <ellipse cx="540" cy="700" rx="350" ry="200" fill="#F59E0B" opacity="0.04" filter="url(#glow3)"/>

  <!-- Top headline -->
  <text x="540" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="800" fill="#FAFAFA">
    Hear a sound
  </text>
  <text x="540" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="800" fill="#FAFAFA">
    you love?
  </text>
  <text x="540" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="800" fill="url(#ember3)">
    Learn to make it.
  </text>

  <!-- Large waveform visualization -->
  <g filter="url(#glow3)" transform="translate(540, 680)">
    <rect x="-350" y="-30" width="10" height="60" rx="5" fill="url(#ember3-v)"/>
    <rect x="-330" y="-50" width="10" height="100" rx="5" fill="url(#ember3-v)"/>
    <rect x="-310" y="-70" width="10" height="140" rx="5" fill="url(#ember3-v)"/>
    <rect x="-290" y="-40" width="10" height="80" rx="5" fill="url(#ember3-v)"/>
    <rect x="-270" y="-90" width="10" height="180" rx="5" fill="url(#ember3-v)"/>
    <rect x="-250" y="-55" width="10" height="110" rx="5" fill="url(#ember3-v)"/>
    <rect x="-230" y="-100" width="10" height="200" rx="5" fill="url(#ember3-v)"/>
    <rect x="-210" y="-65" width="10" height="130" rx="5" fill="url(#ember3-v)"/>
    <rect x="-190" y="-80" width="10" height="160" rx="5" fill="url(#ember3-v)"/>
    <rect x="-170" y="-110" width="10" height="220" rx="5" fill="url(#ember3-v)"/>
    <rect x="-150" y="-75" width="10" height="150" rx="5" fill="url(#ember3-v)"/>
    <rect x="-130" y="-95" width="10" height="190" rx="5" fill="url(#ember3-v)"/>
    <rect x="-110" y="-120" width="10" height="240" rx="5" fill="url(#ember3-v)"/>
    <rect x="-90" y="-85" width="10" height="170" rx="5" fill="url(#ember3-v)"/>
    <rect x="-70" y="-105" width="10" height="210" rx="5" fill="url(#ember3-v)"/>
    <rect x="-50" y="-130" width="10" height="260" rx="5" fill="url(#ember3-v)"/>
    <rect x="-30" y="-100" width="10" height="200" rx="5" fill="url(#ember3-v)"/>
    <rect x="-10" y="-140" width="10" height="280" rx="5" fill="url(#ember3-v)"/>
    <rect x="10" y="-130" width="10" height="260" rx="5" fill="url(#ember3-v)"/>
    <rect x="30" y="-100" width="10" height="200" rx="5" fill="url(#ember3-v)"/>
    <rect x="50" y="-120" width="10" height="240" rx="5" fill="url(#ember3-v)"/>
    <rect x="70" y="-85" width="10" height="170" rx="5" fill="url(#ember3-v)"/>
    <rect x="90" y="-105" width="10" height="210" rx="5" fill="url(#ember3-v)"/>
    <rect x="110" y="-75" width="10" height="150" rx="5" fill="url(#ember3-v)"/>
    <rect x="130" y="-95" width="10" height="190" rx="5" fill="url(#ember3-v)"/>
    <rect x="150" y="-110" width="10" height="220" rx="5" fill="url(#ember3-v)"/>
    <rect x="170" y="-65" width="10" height="130" rx="5" fill="url(#ember3-v)"/>
    <rect x="190" y="-80" width="10" height="160" rx="5" fill="url(#ember3-v)"/>
    <rect x="210" y="-100" width="10" height="200" rx="5" fill="url(#ember3-v)"/>
    <rect x="230" y="-55" width="10" height="110" rx="5" fill="url(#ember3-v)"/>
    <rect x="250" y="-90" width="10" height="180" rx="5" fill="url(#ember3-v)"/>
    <rect x="270" y="-40" width="10" height="80" rx="5" fill="url(#ember3-v)"/>
    <rect x="290" y="-70" width="10" height="140" rx="5" fill="url(#ember3-v)"/>
    <rect x="310" y="-50" width="10" height="100" rx="5" fill="url(#ember3-v)"/>
    <rect x="330" y="-30" width="10" height="60" rx="5" fill="url(#ember3-v)"/>
  </g>

  <!-- "How it works" steps -->
  <g transform="translate(0, 960)">
    <!-- Step 1 -->
    <rect x="80" y="0" width="920" height="110" rx="16" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <circle cx="150" cy="55" r="24" fill="#27272A"/>
    <text x="150" y="62" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#F59E0B">1</text>
    <text x="200" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#FAFAFA">Upload any audio file</text>
    <text x="200" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#71717A">WAV, MP3, or M4A. Drag and drop.</text>

    <!-- Step 2 -->
    <rect x="80" y="130" width="920" height="110" rx="16" fill="#18181B" stroke="#27272A" stroke-width="1"/>
    <circle cx="150" cy="185" r="24" fill="#27272A"/>
    <text x="150" y="192" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#F59E0B">2</text>
    <text x="200" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#FAFAFA">Get the exact breakdown</text>
    <text x="200" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#71717A">Waveform, filter, ADSR, effects, BPM, key.</text>

    <!-- Step 3 -->
    <rect x="80" y="260" width="920" height="110" rx="16" fill="#18181B" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="150" cy="315" r="24" fill="url(#ember3)"/>
    <text x="150" y="322" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#09090B">3</text>
    <text x="200" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#FAFAFA">Download the Vital preset</text>
    <text x="200" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#71717A">One-click download. Open in Vital (free synth).</text>
  </g>

  <!-- CTA -->
  <rect x="140" y="1440" width="800" height="80" rx="16" fill="url(#ember3)"/>
  <text x="540" y="1490" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#09090B">
    Try it free at soundsauce.app
  </text>

  <!-- Logo + branding at bottom -->
  <g transform="translate(460, 1620)">
    <rect width="48" height="48" rx="10" fill="url(#logo3)"/>
    <g stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none">
      <line x1="10" y1="18" x2="10" y2="30"/>
      <line x1="16" y1="13" x2="16" y2="35"/>
      <line x1="22" y1="9" x2="22" y2="39"/>
      <line x1="28" y1="14" x2="28" y2="34"/>
      <line x1="34" y1="17" x2="34" y2="31"/>
      <line x1="40" y1="20" x2="40" y2="28"/>
    </g>
  </g>
  <text x="540" y="1720" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="700" fill="url(#ember3)">
    SoundSauce
  </text>
  <text x="540" y="1760" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#71717A">
    Sound design made simple
  </text>
</svg>
